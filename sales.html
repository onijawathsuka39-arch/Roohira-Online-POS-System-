<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales History | Ruhira POS</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23be185d'/><text x='50' y='50' dominant-baseline='middle' text-anchor='middle' font-family='Outfit' font-weight='bold' font-size='50' fill='white'>R</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
    <style>
        .view-btn {
            padding: 6px 12px;
            font-size: 11px;
            background: var(--primary-glow);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }

        .view-btn:hover {
            background: var(--primary);
            color: white;
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .receipt-detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .receipt-items-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .receipt-items-table th {
            text-align: left;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .receipt-items-table td {
            padding: 8px 0;
            font-size: 13px;
        }

        .receipt-footer {
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }

        @media print {
            @page {
                size: A5;
                margin: 0;
            }

            body>*:not(#printableReceipt) {
                display: none !important;
            }

            #printableReceipt {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 148mm;
                height: 210mm;
                background: white;
                color: black;
                font-family: 'Inter', Arial, sans-serif;
            }

            .receipt-page {
                width: 148mm;
                height: 210mm;
                padding: 10mm;
                padding-top: 15mm !important;
                border: 1px solid #000;
                box-sizing: border-box;
                position: relative;
                page-break-after: always;
            }
        }
    </style>
</head>

<body class="fade-in">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-section">
            <div class="logo-box"><i class="fas fa-gem text-white"></i></div>
            <span class="logo-text">RUHIRA POS</span>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
            <a href="pos.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>POS Terminal</span></a>
            <a href="sales.html" class="nav-item active"><i class="fas fa-history"></i><span>Sales History</span></a>
            <a href="orders.html" class="nav-item"><i class="fas fa-file-invoice"></i><span>Orders</span></a>
            <a href="inventory.html" class="nav-item"><i class="fas fa-boxes"></i><span>Inventory</span></a>
            <a href="expenses.html" class="nav-item"><i class="fas fa-money-bill-wave"></i><span>Expenses</span></a>
            <a href="customers.html" class="nav-item"><i class="fas fa-users"></i><span>Customers</span></a>
            <a href="notes.html" class="nav-item"><i class="fas fa-sticky-note"></i><span>Notes & Tasks</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Reports</span></a>
            <a href="analysis.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Analysis</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="nav-item" onclick="DB.logout()" style="cursor:pointer;"><i
                    class="fas fa-sign-out-alt"></i><span>Logout</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="header-top">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="hamburger-menu" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="page-title">
                    <h1>Sales History</h1>
                    <p>Manage and view all direct sales transactions</p>
                </div>
            </div>
            <div class="header-actions" style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="themeManager.toggle()"
                    style="padding: 8px; width: 40px; justify-content: center;" title="Toggle Theme">
                    <i class="fas fa-sun theme-toggle-icon"></i>
                </button>
                <a href="login.html" class="btn btn-primary" style="padding: 8px 16px; font-size: 13px;"><i
                        class="fas fa-sign-in-alt"></i> Login</a>
                <button onclick="DB.logout()" class="btn btn-secondary"
                    style="padding: 8px 16px; font-size: 13px; border-color: var(--danger); color: var(--danger);"><i
                        class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="table-header">
                <div style="display:flex; gap:12px;">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="salesSearch" placeholder="Search by Customer..."
                            oninput="refreshSales()">
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>DateTime</th>
                            <th>Bill ID</th>
                            <th>Customer</th>
                            <th>Items Summary</th>
                            <th>Total Amount</th>
                            <th>Net Profit</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Sale Detail Modal -->
    <div class="modal-overlay" id="saleDetailModal">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header">
                <h2>Transaction Details</h2>
                <button class="btn btn-secondary" onclick="closeModal('saleDetailModal')">×</button>
            </div>
            <div id="saleDetailsContent">
                <!-- Receipt logic injected here -->
            </div>
            <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;" id="modalActions">
                <button class="btn btn-primary" style="justify-content:center;" onclick="window.print()">
                    <i class="fas fa-print"></i> ADMIN PRINT
                </button>
                <button class="btn btn-success" style="justify-content:center; background: #10b981; color: white;"
                    id="btn-customer-bill">
                    <i class="fas fa-file-invoice"></i> CUSTOMER BILL (A5)
                </button>
                <button class="btn btn-secondary" style="justify-content:center; color:#6366f1; border-color:#6366f1;"
                    id="btn-download-html">
                    <i class="fas fa-file-code"></i> SAVE AS HTML
                </button>
                <button class="btn btn-secondary"
                    style="justify-content:center; color:var(--primary); border-color:var(--primary);"
                    id="btn-edit-sale">
                    <i class="fas fa-edit"></i> EDIT
                </button>
                <button class="btn btn-secondary"
                    style="justify-content:center; color:var(--danger); border-color:var(--danger);"
                    id="btn-delete-sale">
                    <i class="fas fa-trash"></i> DELETE
                </button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await refreshSales();
        });

        async function refreshSales() {
            const allSales = await DB.getAllSales();
            const search = document.getElementById('salesSearch').value.toLowerCase();
            const tableBody = document.getElementById('salesTableBody');

            let filtered = allSales;
            if (search) {
                filtered = allSales.filter(s =>
                    (s.customer && s.customer.toLowerCase().includes(search)) ||
                    (s.customerId && s.customerId.toLowerCase().includes(search)) ||
                    (s.customerPhone && s.customerPhone.toLowerCase().includes(search)) ||
                    s.id.toString() === search.replace('#SL-', '')
                );
            }

            tableBody.innerHTML = '';
            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-dim);">No sales found</td></tr>';
                return;
            }

            filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(s => {
                const profit = s.total - (s.buyTotal || 0);
                const itemsText = s.items ? s.items.map(i => `${i.name} (x${i.qty})`).join(', ') : 'N/A';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-size:12px; color:var(--text-muted);">${new Date(s.date).toLocaleString()}</td>
                    <td style="font-weight:700;">#SL-${s.id}</td>
                    <td>
                        <div style="font-weight:600;">${s.customer || 'Guest'}</div>
                        <div style="font-size:10px; color:var(--text-dim);">${s.customerId || ''}</div>
                    </td>
                    <td style="font-size:12px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${itemsText}">
                        ${itemsText}
                    </td>
                    <td style="font-weight:700; color:var(--primary);">Rs. ${s.total.toLocaleString()}</td>
                    <td style="font-weight:700; color:var(--success);">Rs. ${profit.toLocaleString()}</td>
                    <td>
                        <button class="view-btn" onclick="viewSaleDetail(${s.id})" title="View Bill">
                            <i class="fas fa-eye"></i> VIEW
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        async function deleteSale(id) {
            if (confirm('Permanently delete this sale record? It will be removed from history.')) {
                await DB.deleteSale(id);
                refreshSales();
            }
        }

        async function viewSaleDetail(id) {
            const allSales = await DB.getAllSales();
            const sale = allSales.find(s => s.id === id);
            if (!sale) return;

            const content = document.getElementById('saleDetailsContent');
            const itemsHtml = sale.items.map(i => {
                const originalPrice = i.originalPrice || i.sellPrice;
                const priceDiff = i.sellPrice - originalPrice;
                let indicator = '';
                if (priceDiff < 0) {
                    indicator = `<span style="color:var(--danger); font-size:9px; font-weight:800; display:block;">[REDUCED from Rs. ${originalPrice.toLocaleString()}]</span>`;
                } else if (priceDiff > 0) {
                    indicator = `<span style="color:var(--warning); font-size:9px; font-weight:800; display:block;">[INCREASED from Rs. ${originalPrice.toLocaleString()}]</span>`;
                }

                return `
                    <tr>
                        <td style="padding:8px 0;">
                            <div style="font-weight:600;">${i.name} ${i.size ? `<small>(${i.size})</small>` : ''}</div>
                            ${indicator}
                        </td>
                        <td style="text-align:center;">${i.qty}</td>
                        <td style="text-align:right;">Rs. ${(i.sellPrice * i.qty).toLocaleString()}</td>
                    </tr>
                `;
            }).join('');

            const profit = sale.total - (sale.buyTotal || 0);
            const subtotal = sale.items.reduce((sum, item) => sum + (item.sellPrice * item.qty), 0);
            const discValue = (subtotal * (sale.discount || 0)) / 100;

            content.innerHTML = `
                <div class="receipt-header">
                    <h1 style="font-size:18px; color:var(--primary); margin-bottom:5px;">RUHIRA ONLINE</h1>
                    <p style="font-size:12px; color:var(--text-dim);">Order Ref: #SL-${sale.id}</p>
                    <p style="font-size:11px; color:var(--text-dim);">${new Date(sale.date).toLocaleString()}</p>
                </div>

                <div class="receipt-body">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; background:var(--bg-light); padding:10px; border-radius:8px;">
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">CUSTOMER</div>
                            <div style="font-weight:600; font-size:13px;">${sale.customer || 'Guest'}</div>
                        </div>
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">PHONE</div>
                            <div style="font-weight:600; font-size:13px;">${sale.customerPhone || 'N/A'}</div>
                        </div>
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">PAYMENT</div>
                            <div style="font-weight:600; text-transform:uppercase; font-size:13px;">${sale.paymentMethod || 'cash'}</div>
                        </div>
                        <div>
                            <div style="font-size:10px; color:var(--text-dim);">CUSTOMER ID</div>
                            <div style="font-weight:600; font-size:13px;">${sale.customerId || 'Guest'}</div>
                        </div>
                    </div>

                    <table class="receipt-items-table">
                        <thead>
                            <tr>
                                <th>Item Description</th>
                                <th style="text-align:center;">Qty</th>
                                <th style="text-align:right;">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                        </tbody>
                    </table>

                    <div class="receipt-footer">
                        <div class="receipt-detail-row">
                            <span style="color:var(--text-dim);">Subtotal:</span>
                            <span>Rs. ${subtotal.toLocaleString()}</span>
                        </div>
                        
                        ${sale.discount > 0 ? `
                        <div class="receipt-detail-row" style="color:var(--danger);">
                            <span>Discount (${sale.discount}%):</span>
                            <span>- Rs. ${discValue.toLocaleString()}</span>
                        </div>
                        ` : ''}

                        ${sale.loyaltyDiscount > 0 ? `
                        <div class="receipt-detail-row" style="color:var(--warning); font-weight:600;">
                            <span>Loyalty Points Redeemed:</span>
                            <span>- Rs. ${sale.loyaltyDiscount.toLocaleString()}</span>
                        </div>
                        ` : ''}

                        ${sale.delivery > 0 ? `
                        <div class="receipt-detail-row">
                            <span>Delivery Charge:</span>
                            <span>+ Rs. ${sale.delivery.toLocaleString()}</span>
                        </div>
                        ` : ''}

                        <div class="receipt-detail-row" style="font-weight:800; font-size:22px; color:var(--primary); margin-top:10px; border-top: 1px dashed var(--border); padding-top:10px;">
                            <span>NET TOTAL:</span>
                            <span>Rs. ${sale.total.toLocaleString()}</span>
                        </div>
                        
                        <div style="margin-top:15px; padding:10px; background:var(--success-glow); border-radius:8px; border-left:4px solid var(--success);">
                            <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase;">Business Performance</div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
                                <span style="font-weight:600; color:var(--success);">Net Profit from Bill:</span>
                                <span style="font-weight:800; color:var(--success); font-size:16px;">Rs. ${profit.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('btn-delete-sale').onclick = async () => {
                if (confirm('Permanently delete this sale record?')) {
                    await DB.deleteSale(sale.id);
                    closeModal('saleDetailModal');
                    refreshSales();
                }
            };
            document.getElementById('btn-edit-sale').onclick = () => window.location.href = 'pos.html?editSale=' + sale.id;
            document.getElementById('btn-customer-bill').onclick = () => printCustomerBill(sale.id);
            document.getElementById('btn-download-html').onclick = () => {
                printCustomerBill(sale.id, false); // Populate without printing
                setTimeout(() => downloadHTMLBill(`Bill_SL_${sale.id}`), 100);
            };
            document.getElementById('saleDetailModal').style.display = 'flex';
        }

        async function printCustomerBill(id, triggerPrint = true) {
            const sales = await DB.getAllSales();
            const sale = sales.find(s => s.id === id);
            if (!sale) return;

            const itemsPerPage = 22;
            const itemChunks = [];
            for (let i = 0; i < sale.items.length; i += itemsPerPage) {
                itemChunks.push(sale.items.slice(i, i + itemsPerPage));
            }

            const printContainer = document.getElementById('printableReceipt');
            printContainer.innerHTML = '';
            printContainer.style.display = 'block';

            itemChunks.forEach((chunk, index) => {
                const isLastPage = index === itemChunks.length - 1;
                const pageDiv = document.createElement('div');
                pageDiv.className = 'receipt-page';
                pageDiv.style.cssText = `
                    width: 148mm; min-height: 210mm; padding: 10mm; padding-top: 5mm; 
                    position: relative; box-sizing: border-box; background: white; 
                    page-break-after: always; color: black; font-family: 'Inter', sans-serif;
                `;

                const headerHtml = `
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 2px;">
                        <img src="https://i.ibb.co/nsNtMvd8/Roohira-Batch.png" style="height: 45px; width: auto; object-fit: contain;">
                        <div>
                            <div style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: 1px; color: #000; text-transform: uppercase;">
                                Roohira Collection
                            </div>
                            <div style="font-size: 10px; color: #444; font-weight: 600; margin-top: 4px; letter-spacing: 0.5px;">
                                by Roohira Online | <i class="fas fa-phone-alt" style="font-size:8px;"></i> 0720898640 / 0714433279
                            </div>
                        </div>
                    </div>
                    <div style="border-bottom: 2.5px solid #000; margin-top: 5px; width: 100%; -webkit-print-color-adjust: exact;"></div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px; padding-bottom: 8px; border-bottom: 1px solid #ccc;">
                        <div style="text-align: left;">
                            <h1 style="font-size: 20px; font-weight: 300; margin: 0; color: #000; letter-spacing: 6px; text-transform: uppercase;">INVOICE</h1>
                        </div>
                        <div style="text-align: right;">
                            <p style="font-size: 10px; color: #555; margin: 0;">Page ${index + 1} of ${itemChunks.length}</p>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                        <div style="flex: 1;">
                            <h3 style="font-size: 9px; font-weight: 800; color: #000; text-transform: uppercase; margin: 0 0 4px 0;">CUSTOMER DETAILS</h3>
                            <p style="font-weight: 800; font-size: 14px; margin: 0; color: #000;">${sale.customer || 'Guest Customer'}</p>
                            ${sale.customerId && sale.customerId !== 'Guest' ? `<p style="font-size: 10px; margin: 1px 0 0 0; font-weight: 700; color: #be185d;">ID: ${sale.customerId}</p>` : ''}
                            <p style="font-size: 11px; margin: 1px 0 0 0; font-weight: 500; color: #333;">${sale.customerPhone || 'N/A'}</p>
                        </div>
                        <div style="text-align: right;">
                            <p style="font-weight: 800; font-size: 11px; margin: 0; color: #000;">Invoice: #SL-${sale.id}</p>
                            ${sale.orderId ? `<p style="font-weight: 800; font-size: 11px; margin: 3px 0 0 0; color: #444;">Order Ref: #${sale.orderId}</p>` : ''}
                            <p style="font-size: 11px; color: #444; margin: 3px 0 0 0; font-weight: 500;">Date: ${new Date(sale.date).toLocaleDateString()}</p>
                            ${sale.deliveryMethod ? `<p style="font-size: 11px; margin: 3px 0 0 0; font-weight: 600; color: #111;">Method: ${sale.deliveryMethod}</p>` : `<p style="font-size: 11px; margin: 3px 0 0 0; font-weight: 600; color: #111;">Method: Store Pickup</p>`}
                        </div>
                    </div>
                `;

                let tableRows = chunk.map(item => {
                    const originalPrice = item.originalPrice || item.sellPrice;
                    const priceDiff = item.sellPrice - originalPrice;
                    let priceDetails = `Rs. ${item.sellPrice.toLocaleString()}`;
                    if (priceDiff !== 0) {
                        priceDetails += `<br><span style="font-size:8px; color:#777;">(Orig: Rs. ${originalPrice.toLocaleString()})</span>`;
                    }
                    return `
                        <tr style="border-bottom: 1px solid #eee;">
                            <td style="padding:6px 0; text-align: left; font-weight: 500; font-size: 10px;">
                                ${item.name}
                                ${item.size ? `<span style="font-size:9px; color:#666;"> - Size: ${item.size}</span>` : ''}
                            </td>
                            <td style="padding:6px 0; text-align: center; font-size: 10px;">${item.qty}</td>
                            <td style="padding:6px 0; text-align: right; font-size: 10px;">${priceDetails}</td>
                            <td style="padding:6px 0; text-align: right; font-weight: 700; font-size: 10px;">Rs. ${(item.sellPrice * item.qty).toLocaleString()}</td>
                        </tr>
                    `;
                }).join('');

                const tableHtml = `
                    <div style="margin-top: 10px;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 2px solid #000;">
                                    <th style="padding: 6px 0; text-align: left; font-size: 9px; font-weight: 800; text-transform: uppercase;">Item Descriptions</th>
                                    <th style="padding: 6px 0; text-align: center; font-size: 9px; font-weight: 800; text-transform: uppercase; width: 40px;">Qty</th>
                                    <th style="padding: 6px 0; text-align: right; font-size: 9px; font-weight: 800; text-transform: uppercase; width: 80px;">Price</th>
                                    <th style="padding: 6px 0; text-align: right; font-size: 9px; font-weight: 800; text-transform: uppercase; width: 80px;">Total</th>
                                </tr>
                            </thead>
                            <tbody style="font-size: 10px;">
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                `;

                pageDiv.innerHTML = headerHtml + tableHtml;

                if (isLastPage) {
                    const subtotal = sale.items.reduce((sum, item) => sum + (item.sellPrice * item.qty), 0);
                    const discVal = (subtotal * (sale.discount || 0)) / 100;
                    
                    const totalsHtml = `
                        <div style="margin-top: 10px; margin-left: auto; width: 220px;">
                            <div style="display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px;">
                                <span style="font-weight: 600; color: #555;">Subtotal:</span>
                                <span style="font-weight: 700;">Rs. ${subtotal.toLocaleString()}</span>
                            </div>
                            ${sale.discount > 0 ? `
                            <div style="display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; color: #a00;">
                                <span style="font-weight: 600;">Discount:</span>
                                <span style="font-weight: 700;">- Rs. ${discVal.toLocaleString()}</span>
                            </div>` : ''}
                            ${sale.loyaltyDiscount > 0 ? `
                            <div style="display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; color: #b45309;">
                                <span style="font-weight: 600;">Loyalty Disc:</span>
                                <span style="font-weight: 700;">- Rs. ${sale.loyaltyDiscount.toLocaleString()}</span>
                            </div>` : ''}

        function downloadHTMLBill(filename) {
            const billContent = document.getElementById('printableReceipt').innerHTML;
            const fullHtml = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${filename}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 20px; background: #f4f7f6; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .receipt-page { background: white; width: 148mm; min-height: 210mm; padding: 10mm; padding-top: 15mm; border: 1px solid #000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; margin-bottom: 20px; }
        @media print {
            body { padding: 0; background: white; }
            .receipt-page { box-shadow: none; margin: 0; width: 148mm; height: 210mm; padding-top: 15mm !important; border: 1px solid #000; page-break-after: always; }
            .no-print { display: none !important; }
            @page { size: A5; margin: 0; }
        }
        .no-print { margin-bottom: 20px; text-align: center; width: 100%; max-width: 148mm; }
        .btn { padding: 12px 25px; background: #be185d; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #9d174d; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="no-print">
        <button class="btn" onclick="window.print()">PRINT THIS BILL (A5)</button>
        <p style="font-size: 13px; color: #666; margin-top: 10px; font-weight: 500;">Roohira Collection - Customer Invoice File</p>
    </div>
    ${billContent}
</body>
</html>`;

            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + ".html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>

    <!-- Printable Container (Handles multiple A5 pages) -->
    <div id="printableReceipt" style="display:none; position: absolute; left: 0; top: 0;"></div>
</body>

</html>
